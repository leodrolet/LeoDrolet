<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>500 — Erreur serveur · Novio Studio</title>
<meta name="robots" content="noindex" />

<link rel="icon" href="/favicon.ico" sizes="any" />
<link rel="apple-touch-icon" href="/apple-touch-icon.png" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600&display=swap" />

<style>
  :root {
    --bg: #0a0a0a;
    --ink: #efece4;
    --ink-2: #b9b6ad;
    --accent: #ff5b2e;
    --display: "Instrument Serif", Georgia, serif;
    --sans: "Geist", system-ui, sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--sans);
    min-height: 100dvh;
  }

  canvas.grain {
    position: fixed;
    inset: 0;
    z-index: 9999;
    pointer-events: none;
    mix-blend-mode: overlay;
    opacity: .045;
  }

  .page {
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: clamp(32px, 8vw, 80px) clamp(20px, 5vw, 40px);
  }

  .eyebrow {
    font-family: var(--sans);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: .15em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 20px;
  }

  .code {
    font-family: var(--display);
    font-size: clamp(100px, 20vw, 200px);
    line-height: 1;
    color: var(--ink);
    margin-bottom: 24px;
  }

  .code::after {
    content: '';
    display: block;
    width: 48px;
    height: 2px;
    background: var(--accent);
    margin: 28px auto 0;
  }

  .title {
    font-family: var(--display);
    font-size: clamp(22px, 4vw, 36px);
    font-weight: 400;
    color: var(--ink);
    margin-bottom: 16px;
    margin-top: 28px;
  }

  .subtitle {
    font-size: 15px;
    color: var(--ink-2);
    max-width: 400px;
    line-height: 1.6;
    margin-bottom: 48px;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 14px 28px;
    background: var(--accent);
    color: #0a0a0a;
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: .04em;
    text-decoration: none;
    border-radius: 6px;
    transition: opacity .2s;
  }

  .btn:hover { opacity: .85; }

  .btn svg { width: 14px; height: 14px; }

  .logo {
    position: fixed;
    top: 28px;
    left: clamp(20px, 4vw, 48px);
    font-family: var(--display);
    font-size: 18px;
    color: var(--ink);
    text-decoration: none;
  }
</style>
</head>
<body>

<canvas class="grain" id="grain-canvas"></canvas>

<a class="logo" href="/">Novio Studio</a>

<div class="page">
  <p class="eyebrow">Erreur 500</p>
  <div class="code">500</div>
  <h1 class="title">Erreur serveur</h1>
  <p class="subtitle">Une erreur inattendue s'est produite de notre côté. Réessayez dans quelques instants — on s'en occupe.</p>
  <a class="btn" href="/">
    <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M11 7H3M6 4 3 7l3 3"/>
    </svg>
    Retour à l'accueil
  </a>
</div>

<script>
  (function(){
    var c=document.getElementById('grain-canvas'),ctx=c.getContext('2d');
    function resize(){c.width=window.innerWidth;c.height=window.innerHeight;}
    function draw(){
      var w=c.width,h=c.height,d=ctx.createImageData(w,h),b=d.data;
      for(var i=0;i<b.length;i+=4){var v=Math.random()*255|0;b[i]=b[i+1]=b[i+2]=v;b[i+3]=255;}
      ctx.putImageData(d,0,0);
    }
    resize();draw();
    window.addEventListener('resize',function(){resize();draw();});
  })();
</script>

</body>
</html>
